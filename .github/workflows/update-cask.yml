name: Update Deepink Cask (reusable)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      token:
        required: true

  workflow_dispatch:
    inputs:
      version:
        description: "Version to update (e.g. 0.1.4 or v0.1.4)"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4

      - name: Normalize version
        id: vars
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release & compute SHA256
        id: sha
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          URL="https://github.com/DeepinkApp/deepink/releases/download/v$VERSION/deepink-darwin-arm64-$VERSION.zip"

          curl -L --fail -o app.zip "$URL"
          SHA=$(shasum -a 256 app.zip | awk '{print $1}')

          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update cask
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          SHA=${{ steps.sha.outputs.sha256 }}

          sed -i.bak "s/version \".*\"/version \"$VERSION\"/" Casks/deepink.rb
          sed -i.bak "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/deepink.rb
          rm Casks/deepink.rb.bak

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "deepink ${{ steps.vars.outputs.version }}"
          title: "Update deepink to ${{ steps.vars.outputs.version }}"
          branch: update-deepink-${{ steps.vars.outputs.version }}
